# Force-load RK3588 hardware acceleration modules at boot.
# Most of these are auto-probed via DT compat strings, but this guarantees
# they're present (and visible to v4l2-ctl --list-devices) on first boot.
#
# Installed to /etc/modules-load.d/ from the soc overlay when the rootfs is built.

# Verisilicon IOMMU (added by the AV1 IOMMU v14 patch — needed for VDPU981 AV1)
vsi_iommu

# Rockchip V4L2 stateless decoder — VDPU381 H.264/HEVC, VDPU383, VP9
rockchip_vdec

# Hantro/Verisilicon driver — VDPU121 (VP8/MPEG-2/MPEG-4) + VDPU981 (AV1) on RK3588
hantro_vpu

# RGA2 + RGA3 multicore (vendor OOT driver from rockchip-linux/kernel develop-6.6).
# Module is built as rga3.ko (per drivers/video/rockchip/rga3/Makefile
# obj-$(CONFIG_ROCKCHIP_MULTI_RGA) += rga3.o), despite the Kconfig symbol
# being ROCKCHIP_MULTI_RGA. Driver matches DT compat strings rockchip,rga2_core0,
# rockchip,rga3_core0, rockchip,rga3_core1 and exposes /dev/rga (misc char dev).
rga3

# VEPU580 H.264/HEVC encoder
# Module is built as rkvenc.ko (rkvenc-objs := rkvenc_drv.o ...) by the
# out-of-tree RKVENC patch, despite the Kconfig symbol being VIDEO_ROCKCHIP_RKVENC.
rkvenc

# NPU (Rocket / RKNN)
rocket
