# recipes/turing-rk1-media-accel-trixie.toml — the Turing RK1 with the Rockchip
# hardware video-transcode userspace on Debian trixie. The trixie-suite sibling of
# turing-rk1-media-accel-forky: the same accel kernel and the same
# media-accel-rockchip userspace (MPP + RGA + ffmpeg-rk, built from source and so
# suite-independent), over a trixie userland.
# Constraints only; the exact resolution is written to the sibling .lock.
device     = "turing-rk1"
kernel     = "rk3588-mainline-7.1"       # omit -> device default_kernel
suite      = "trixie"
features   = ["media-accel-rockchip"]    # HW transcode userspace (MPP + RGA + ffmpeg-rk)
layout     = "combined"                  # omit -> device default_layout
image_size = "2G"
