# recipes/turing-rk1-forky.toml — the Turing RK1 base image on Debian forky.
# The board's validated suite. A base image: a full Debian userland plus the
# accel-capable kernel. The rk3588-mainline-7.1 kernel bakes in the rk3588-accel
# patch profile and the accel/full kconfig, so the VEPU/VDPU/RGA and NPU drivers
# are present in the kernel — the hardware blocks are there, just dark. What a base
# image omits is the Rockchip media *userspace* (MPP + RGA + ffmpeg-rk); add it
# later from the media-accel debs, or build it in from the start with
# turing-rk1-media-accel-forky.
# Constraints only; the exact resolution is written to the sibling .lock.
device     = "turing-rk1"
kernel     = "rk3588-mainline-7.1"       # omit -> device default_kernel
suite      = "forky"                     # omit -> device default_suite
features   = []                          # base: accel kernel, no media userspace
layout     = "combined"                  # omit -> device default_layout
image_size = "2G"
