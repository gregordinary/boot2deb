# recipes/turing-rk1-trixie.toml — the Turing RK1 base image on Debian trixie.
# The trixie-suite sibling of turing-rk1-forky: the same device and accel-capable
# kernel (rk3588-accel patches + accel/full kconfig, so the VEPU/VDPU/RGA and NPU
# drivers are present), over a trixie userland instead of forky. A base image — it
# carries no Rockchip media userspace; add it later from the media-accel debs, or
# build it in with turing-rk1-media-accel-trixie.
# Constraints only; the exact resolution is written to the sibling .lock.
device     = "turing-rk1"
kernel     = "rk3588-mainline-7.1"       # omit -> device default_kernel
suite      = "trixie"
features   = []                          # base: accel kernel, no media userspace
layout     = "combined"                  # omit -> device default_layout
image_size = "2G"
