# Bluetooth on this board is on UART: hci_bcm plus the vendored BCM4354.hcd
# patchram. The BCM4354's SDIO interface ALSO advertises a Bluetooth function,
# and if btsdio binds it, brcmfmac's wifi does not survive suspend/resume
# (established veyron-family fix; see board-bringup/asus-c201/sdcard/README.md).
blacklist btsdio
