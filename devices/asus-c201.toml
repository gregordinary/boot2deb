# devices/asus-c201.toml — ASUS Chromebook C201 / C201PA (google,veyron-speedy).
#
# An RK3288 Veyron Chromebook: 32-bit Arm, ChromeOS firmware, and — unusually for a
# board this far from a reference design — nothing that must be built. Its device
# tree is upstream, Debian's own kernel runs it by default (a compiled mainline
# kernel is an opt-in recipe choice), and its bootloader is coreboot in an SPI
# chip. Its radio, its initramfs, its network stack and its audio fixup are all
# family properties and live on socs/rk3288. What is left here is a boot method, a
# board profile, a DTB, and the handful of defaults a build needs — which is what a
# device file is supposed to be.
description             = "ASUS Chromebook C201 (RK3288, google,veyron-speedy)"
soc                     = "rk3288"                          # -> arch=armv7, dt_dir, modules, radio, network
boot_method             = "depthcharge"
supported_boot_methods  = ["depthcharge"]

# The board is upstream, so the kernel builds this DTB from its own tree and there is
# no `device_dts` to carry. It is what makes the rest of the Veyron family nearly
# free: a sibling board is a device file and nothing else.
kernel_dtb              = "rockchip/rk3288-veyron-speedy.dtb"

# No `uboot_defconfig`: the bootloader is coreboot in SPI, never ours to build.
# `device_config_fragments` stays empty — the board needs no kconfig beyond the
# rk3288 SoC slice when a recipe compiles the mainline kernel.
device_config_fragments = []

supported_kernels       = ["debian-armmp", "rk3288-mainline-7.1"]
default_kernel          = "debian-armmp"
default_suite           = "forky"                           # validated on the hardware; trixie also boots
default_layout          = "combined"
hostname                = "asus-c201"

# The shipped image only has to hold its own content — first boot grows the rootfs
# partition to fill whatever card it lands on and resizes the filesystem onto it. So
# this is sized for the ~700 MB the image actually occupies, with room to spare, and
# not for the medium: a bigger number would buy nothing on the running board and cost
# a slower flash (the empty space compresses away in the `.xz`, but it is still written
# to the card) and a larger minimum card.
image_size              = "2G"

# A laptop, with a keyboard under the user's hands. The C201PA ships a US layout.
keymap                  = "us"

# --- The board profile ---------------------------------------------------------
# `speedy` is the *stock* depthcharge profile, and it is the default deliberately: a
# stock-profile image boots on stock firmware AND on a unit running libreboot, while
# the reverse is not true. Both are confirmed on the hardware.
#
# `speedy-libreboot` is selectable (`--board speedy-libreboot`) for a unit with
# libreboot installed. It buys a 32 MiB payload ceiling instead of 16 MiB, which is
# headroom for a debug initramfs carrying the display stack — worth having, not worth
# defaulting to. It is the only libreboot profile depthcharge-tools ships for this
# family: the C100P and the Chromebit have stock profiles only.
#
# (This table is last because TOML scopes every key after a table header into it.)
[depthcharge]
board            = "speedy"
supported_boards = ["speedy", "speedy-libreboot"]
