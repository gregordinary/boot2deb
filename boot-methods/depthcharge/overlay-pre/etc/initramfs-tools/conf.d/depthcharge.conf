# initramfs settings every depthcharge board needs. Both are forced by the payload
# budget: the signed image carries the kernel AND the initramfs, under a ceiling the
# firmware enforces, so the initramfs is not free the way it is on a board that loads
# it from a filesystem.
#
# This is a `overlay-pre` file — laid into the rootfs before any package installs — so
# the very first initramfs the kernel's maintainer scripts build is already the right
# one. Configuring it afterwards would mean building a MODULES=most initramfs under
# qemu and then throwing it away.
#
# It is also a drop-in, not /etc/initramfs-tools/initramfs.conf, which is a conffile:
# writing that before the package unpacks makes dpkg prompt about a locally-modified
# file. mkinitramfs reads conf.d/* unconditionally, so a drop-in has the same effect
# and no packaging conflict.

# MODULES=list, not dep. Two reasons, and the second is the sharp edge:
#
#  - Budget. A MODULES=most initramfs does not fit under the payload ceiling once the
#    zImage has taken its share.
#
#  - Correctness under cross-build. MODULES=dep guesses from the *building* system's
#    mounted /sys and /, so in an armhf chroot on an x86_64 host it resolves the
#    host's root device and produces an initramfs with none of the drivers the board
#    needs. It is only meaningful when built on the target; an explicit list is
#    deterministic and works in both places.
#
# The list itself is a device-layer drop-in (usr/share/initramfs-tools/modules.d/).
MODULES=list

# xz, not zstd. On the C201 the numbers decide it: the ceiling is 16,777,216 bytes and
# the zImage alone is 6,832,640 of them. A zstd initramfs measured 9,752,964, for a
# total of 16,635,856 — inside the ceiling by 141 KB, before the FIT and vboot headers
# are added. That is not headroom, it is a coin toss. xz buys ~2 MB of margin for a
# few seconds of one-time boot decompression.
COMPRESS=xz
